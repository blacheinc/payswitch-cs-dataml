[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
pythonpath = .
# Treat the current directory as a package root
norecursedirs = .git .venv venv env schema-mapping-env __pycache__ *.egg
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
